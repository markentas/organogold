<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganoGold - Café Premium</title>
    <link rel="icon" type="image/svg+xml" href="img/organogold.svg">
    <link rel="apple-touch-icon" href="img/organogold.svg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #1a1a1a;
            --dark: #0d0d0d;
            --gray: #333;
            --silver: #c0c0c0;
            --gold: #d4af37;
            --cream: #f5f5dc;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Open Sans', system-ui, sans-serif;
            background: var(--dark);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, #0d0d0d 0%, #1a1512 100%);
            position: relative;
            flex: 1;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(192, 192, 192, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 25px;
            animation: fadeInUp 0.8s ease-out both;
        }

        .hero-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .hero h1 {
            font-family: 'Open Sans', sans-serif;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 25px;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out 0.1s both;
            color: #fff;
            font-weight: 400;
        }

        .hero-tagline {
            font-size: 1.1rem;
            color: var(--gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
            font-weight: 400;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .hero-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 40px;
            min-width: 180px;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.3s ease;
            text-decoration: none;
            gap: 8px;
        }

        .hero-btn-primary {
            background: var(--gold);
            color: #000;
            border: 1px solid var(--gold);
        }

        .hero-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
        }

        .hero-btn-whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: #fff;
            border: 1px solid #25D366;
        }

        .hero-btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.4);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-logo {
                width: 90px;
                height: 90px;
            }
            
            .hero h1 {
                font-size: 1.8rem;
                letter-spacing: 12px;
            }
            
            .hero-tagline {
                font-size: 0.75rem;
                letter-spacing: 6px;
            }
            
            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }

            .coffee-btn {
                width: 100%;
                max-width: 280px;
            }
        }

        /* Footer */
        footer {
            padding: 40px 20px;
            text-align: center;
            background: #050505;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-logo {
            font-family: 'Open Sans', sans-serif;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 8px;
            color: #c0c0c0;
            margin-bottom: 10px;
        }

        .footer-text {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .footer-projects {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .footer-project {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.3s ease;
            min-width: 130px;
        }

        .footer-project:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #c0c0c0;
            transform: translateY(-3px);
        }

        .footer-project-icon {
            width: 40px;
            height: 40px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-project-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .footer-project-name {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.75rem;
            color: #fff;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .footer-project-label {
            font-size: 0.6rem;
            color: #666;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Productos Section */
        .productos {
            padding: 80px 20px;
            background: var(--dark);
            min-height: 50vh;
        }

        .productos-titulo {
            text-align: center;
            font-family: 'Open Sans', sans-serif;
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 8px;
            color: var(--gold);
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .productos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .producto-card {
            background: linear-gradient(145deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .producto-card:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.15);
        }

        .producto-card.agotado {
            opacity: 0.6;
        }

        .producto-imagen {
            width: 100%;
            height: 350px;
            object-fit: cover;
            background: #222;
        }

        .producto-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
            text-align: center;
        }

        .producto-nombre {
            font-family: 'Open Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .producto-precio {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .producto-disponibles {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .producto-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.3s ease;
            margin-top: auto;
        }

        .producto-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
        }

        .producto-agotado-badge {
            display: inline-block;
            padding: 8px 20px;
            background: #333;
            color: #888;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            margin-top: auto;
        }

        .disponibles-mensaje {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }

        .disponibles-mensaje i {
            font-size: 3rem;
            color: var(--gold);
            margin-bottom: 20px;
            display: block;
        }

        .disponibles-mensaje-leyenda {
            font-size: 1.2rem;
            color: #fff;
            display: block;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .disponibles-mensaje p {
            margin-bottom: 25px;
            line-height: 1.8;
        }

        /* Slider Section - Swiper */
        .slider-section {
            background: linear-gradient(180deg, var(--dark) 0%, #1a1512 50%, var(--dark) 100%);
            padding: 40px 15px;
            position: relative;
        }

        .slider-section::before,
        .slider-section::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 80px;
            pointer-events: none;
        }

        .slider-section::before {
            top: 0;
            background: linear-gradient(to bottom, var(--dark), transparent);
        }

        .slider-section::after {
            bottom: 0;
            background: linear-gradient(to top, var(--dark), transparent);
        }

        .swiper {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .swiper-slide {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 10px;
        }

        .swiper-slide img {
            flex: 1 1 350px;
            max-width: 500px;
            width: 100%;
            height: auto;
            min-height: 200px;
            aspect-ratio: 3/4;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .slider-caption {
            flex: 1 1 280px;
            max-width: 400px;
            width: 100%;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .slider-caption-titulo {
            font-family: 'Open Sans', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .slider-caption-cantidad {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .slider-caption-desc {
            font-size: 0.85rem;
            color: #ccc;
            line-height: 1.7;
        }

        /* Swiper Navigation & Pagination */
        .swiper-button-prev,
        .swiper-button-next {
            color: var(--gold);
            background: rgba(212, 175, 55, 0.15);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.3);
        }

        .swiper-button-prev:after,
        .swiper-button-next:after {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .swiper-button-prev:hover,
        .swiper-button-next:hover {
            background: var(--gold);
            color: #000;
        }

        .swiper-pagination-bullet {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid transparent;
            opacity: 1;
        }

        .swiper-pagination-bullet-active {
            background: var(--gold);
            border-color: rgba(212, 175, 55, 0.4);
            transform: scale(1.2);
        }

        .swiper-pagination {
            position: relative;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-logo">
                <img src="img/organogold.svg" alt="OrganoGold">
            </div>
            <h1>ORGANO GOLD</h1>
            <p class="hero-tagline">El mejor café del mundo, ahora en tu hogar</p>
            
            <div class="hero-buttons">
                <a href="#productos" class="hero-btn hero-btn-primary">Entrar</a>
                <a href="https://wa.me/5493873407054?text=Hola%2C%20quiero%20informaci%C3%B3n%20sobre%20los%20caf%C3%A9s" target="_blank" class="hero-btn hero-btn-whatsapp">
                    <i class="fab fa-whatsapp"></i>
                    Contactar
                </a>
            </div>
        </div>
    </section>

    <!-- Productos Section -->
    <section class="productos" id="productos">
        <h2 class="productos-titulo">NUESTROS CAFÉS</h2>
        <div id="productosGrid" class="productos-grid"></div>
    </section>

    <!-- Slider Section -->
    <section class="slider-section" id="galeria">
        <h2 class="productos-titulo">NUESTROS CAFÉS</h2>
        
        <div class="swiper">
            <div class="swiper-wrapper" id="swiperWrapper"></div>
            <div class="swiper-pagination"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-button-next"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-logo">ORGANO GOLD</div>
        <p class="footer-text">Visita también:</p>
        
        <div class="footer-projects">
            <a href="../" target="_blank" class="footer-project">
                <div class="footer-project-icon">
                    <img src="img/favicon.svg" alt="Markentas">
                </div>
                <span class="footer-project-name">Markentas</span>
                <span class="footer-project-label">Tarjetas Digitales</span>
            </a>
            <a href="../dulcesmazza" target="_blank" class="footer-project">
                <div class="footer-project-icon">
                    <img src="img/dulcesmazza.svg" alt="Dulces Mazza">
                </div>
                <span class="footer-project-name">Dulces Mazza</span>
                <span class="footer-project-label">Masas Caseras</span>
            </a>
        </div>
    </footer>

    <script src="productos/productos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        const sliderData = [
            {
                img: 'productos/img/og-black.jpg',
                titulo: 'Gourmet Café Negro',
                cantidad: '30 sobres por caja',
                descripcion: 'Experimente en un instante el aroma del café recién hecho con el Café Negro Gourmet de ORGANO. Los expertos apreciarán su sabor robusto y suave, enriquecido con rico Ganoderma lucidum. Despierte sus sentidos y enriquezca su día con una clásica taza de café tan sabrosa como estimulante.'
            },
            {
                img: 'productos/img/og-latte.jpg',
                titulo: 'Gourmet Café Latte',
                cantidad: '20 sobres por caja',
                descripcion: 'Disfrute en un instante de un delicioso latte al alcance de su mano con el Café Latte Gourmet de ORGANO. Nuestros delicados granos de café Arábica de gran calidad y el Ganoderma se mezclan con crema y azúcar para conseguir un latte ligero y cremoso, ¡y sin tener que esperar en fila para conseguirlo! Sabroso, rápido y deliciosamente revitalizante.'
            },
            {
                img: 'productos/img/og-supreme.webp',
                titulo: 'ORGANO Gourmet Café Supreme',
                cantidad: '20 sobres por caja',
                descripcion: 'ORGANO Gourmet Café Supreme es una mezcla suave y ligera de café, con un sabor cremoso y un toque dulce. Notas sutiles de canela y chocolate, creadas por el método seguido en el tostado, hacen que esta mezcla sea ideal para cargarse de energía por la mañana o a mediodía.'
            },
            {
                img: 'productos/img/og-mocha.jpg',
                titulo: 'Gourmet Café Mocha',
                cantidad: '15 sobres por caja',
                descripcion: 'La exquisitez y la delicia van de la mano en esta lujosa bebida. Una mezcla de nuestro café de gran calidad con el cacao más delicado y nuestro famoso Ganoderma, el Café Mocha Gourmet de ORGANO le ofrece el rico sabor con un toque de cacao que esperaría de un mocha. Perfecto tras la cena o para darse un lujo a media tarde.'
            },
            {
                img: 'productos/img/og-cocoa.jpg',
                titulo: 'Gourmet Cocoa Caliente',
                cantidad: '15 sobres por caja',
                descripcion: 'Experimente el lujo de nuestro increíblemente conocido chocolate caliente: su gran sabor también está infusionado con nuestro exclusivo Ganoderma lucidum. Su confort, calor y una textura suave como la seda hacen que ésta resulte una taza llena de felicidad para toda la familia.'
            }
        ];

        function initSlider() {
            const wrapper = document.getElementById('swiperWrapper');

            sliderData.forEach((slide) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'swiper-slide';
                slideDiv.innerHTML = `
                    <img src="${slide.img}" alt="${slide.titulo}">
                    <div class="slider-caption">
                        <h3 class="slider-caption-titulo">${slide.titulo}</h3>
                        <p class="slider-caption-cantidad">${slide.cantidad}</p>
                        <p class="slider-caption-desc">${slide.descripcion}</p>
                    </div>
                `;
                wrapper.appendChild(slideDiv);
            });

            const swiper = new Swiper('.swiper', {
                loop: true,
                autoplay: {
                    delay: 4000,
                    disableOnInteraction: false
                },
                pagination: {
                    el: '.swiper-pagination',
                    clickable: true
                },
                navigation: {
                    nextEl: '.swiper-button-next',
                    prevEl: '.swiper-button-prev'
                },
                spaceBetween: 30,
                grabCursor: true
            });
        }

        document.addEventListener('DOMContentLoaded', initSlider);
    </script>
</body>
</html>
