<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrganoGold - Café Premium</title>
    <link rel="icon" type="image/svg+xml" href="img/organogold.svg">
    <link rel="apple-touch-icon" href="img/organogold.svg">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #1a1a1a;
            --dark: #0d0d0d;
            --gray: #333;
            --silver: #c0c0c0;
            --gold: #d4af37;
            --cream: #f5f5dc;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Open Sans', system-ui, sans-serif;
            background: var(--dark);
            color: #fff;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, #0d0d0d 0%, #1a1512 100%);
            position: relative;
            flex: 1;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 30%, rgba(192, 192, 192, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 50% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 25px;
            animation: fadeInUp 0.8s ease-out both;
        }

        .hero-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .hero h1 {
            font-family: 'Open Sans', sans-serif;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 25px;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease-out 0.1s both;
            color: #fff;
            font-weight: 400;
        }

        .hero-tagline {
            font-size: 0.9rem;
            color: #555;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
            font-weight: 300;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .coffee-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 20px 50px;
            min-width: 200px;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        /* Efecto glass shimmer animado siempre visible */
        @keyframes shimmer {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        /* Cafe Black - Negro con dorado (paquete real) */
        .coffee-btn.black {
            background: linear-gradient(90deg, 
                rgba(15, 15, 15, 0.95) 0%, 
                rgba(25, 25, 25, 0.9) 50%, 
                rgba(15, 15, 15, 0.95) 100%);
            background-size: 200% 100%;
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(212, 175, 55, 0.2),
                        inset 0 -1px 0 rgba(212, 175, 55, 0.1);
            animation: shimmer 4s ease-in-out infinite;
        }

        .coffee-btn.black:hover {
            animation: none;
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 0 rgba(212, 175, 55, 0.3);
            border-color: rgba(212, 175, 55, 0.7);
        }

        /* Cafe Latte - Marrón/chocolate con dorado (paquete real) */
        .coffee-btn.latte {
            background: linear-gradient(90deg, 
                rgba(70, 45, 30, 0.95) 0%, 
                rgba(90, 60, 40, 0.9) 50%, 
                rgba(70, 45, 30, 0.95) 100%);
            background-size: 200% 100%;
            color: #f5e6d3;
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: 0 4px 30px rgba(90, 50, 30, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.15),
                        inset 0 -1px 0 rgba(212, 175, 55, 0.2);
            animation: shimmer 4s ease-in-out infinite;
        }

        .coffee-btn.latte:hover {
            animation: none;
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(90, 50, 30, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border-color: rgba(212, 175, 55, 0.7);
        }

        /* Gourmet Supreme - Plata/gris con dorado (paquete real) */
        .coffee-btn.gourmet {
            background: linear-gradient(90deg, 
                rgba(140, 140, 145, 0.95) 0%, 
                rgba(170, 170, 175, 0.9) 50%, 
                rgba(140, 140, 145, 0.95) 100%);
            background-size: 200% 100%;
            color: #1a1a1a;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 4px 30px rgba(150, 150, 155, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.4),
                        inset 0 -1px 0 rgba(212, 175, 55, 0.2);
            animation: shimmer 4s ease-in-out infinite;
        }

        .coffee-btn.gourmet:hover {
            animation: none;
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(150, 150, 155, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.5);
            border-color: rgba(212, 175, 55, 0.8);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-logo {
                width: 90px;
                height: 90px;
            }
            
            .hero h1 {
                font-size: 1.8rem;
                letter-spacing: 12px;
            }
            
            .hero-tagline {
                font-size: 0.75rem;
                letter-spacing: 6px;
            }
            
            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }

            .coffee-btn {
                width: 100%;
                max-width: 280px;
            }
        }

        /* Footer */
        footer {
            padding: 40px 20px;
            text-align: center;
            background: #050505;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-logo {
            font-family: 'Open Sans', sans-serif;
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 8px;
            color: #c0c0c0;
            margin-bottom: 10px;
        }

        .footer-text {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .footer-projects {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .footer-project {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.3s ease;
            min-width: 130px;
        }

        .footer-project:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #c0c0c0;
            transform: translateY(-3px);
        }

        .footer-project-icon {
            width: 40px;
            height: 40px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer-project-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .footer-project-name {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.75rem;
            color: #fff;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .footer-project-label {
            font-size: 0.6rem;
            color: #666;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-logo">
                <img src="img/organogold.svg" alt="OrganoGold">
            </div>
            <h1>ORGANO GOLD</h1>
            <p class="hero-tagline">Muy pronto</p>
            
            <div class="hero-buttons">
                <span class="coffee-btn black">Café Black</span>
                <span class="coffee-btn latte">Café Latte</span>
                <span class="coffee-btn gourmet">Gourmet Supreme</span>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-logo">ORGANO GOLD</div>
        <p class="footer-text">Visita también:</p>
        
        <div class="footer-projects">
            <a href="../" target="_blank" class="footer-project">
                <div class="footer-project-icon">
                    <img src="img/favicon.svg" alt="Markentas">
                </div>
                <span class="footer-project-name">Markentas</span>
                <span class="footer-project-label">Tarjetas Digitales</span>
            </a>
            <a href="../dulcesmazza" target="_blank" class="footer-project">
                <div class="footer-project-icon">
                    <img src="img/dulcesmazza.svg" alt="Dulces Mazza">
                </div>
                <span class="footer-project-name">Dulces Mazza</span>
                <span class="footer-project-label">Masas Caseras</span>
            </a>
        </div>
    </footer>
</body>
</html>
